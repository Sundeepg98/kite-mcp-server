dbs:
  - path: /data/alerts.db
    replicas:
      - type: s3
        bucket: ${LITESTREAM_BUCKET}
        path: alerts.db
        endpoint: https://${LITESTREAM_R2_ACCOUNT_ID}.r2.cloudflarestorage.com
        region: auto
        access-key-id: ${LITESTREAM_ACCESS_KEY_ID}
        secret-access-key: ${LITESTREAM_SECRET_ACCESS_KEY}
        sync-interval: 10s
