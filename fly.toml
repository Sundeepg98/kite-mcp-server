app = "kite-mcp-server"
primary_region = "bom"

# Graceful-shutdown window. Fly's default kill_timeout is 5s, but the app's
# HTTP drain is 10s and litestream needs a final WAL->R2 sync + the audit
# async write-buffer must flush on stop. With scale-to-zero, stops are now
# frequent, so give the clean-shutdown path room before SIGKILL.
kill_timeout = "15s"

# Secondary region prepared for future activation: "sin" (Singapore).
# Activation is GATED on adding a non-Kite broker — see
# docs/operator-playbook.md "Multi-region" and
# docs/incident-response.md "Region failover (deferred)".
#
# Do NOT add to a regions list while Kite is the only broker:
#   1. SEBI April-2026 mandate ties our static egress IP (209.71.68.157,
#      bom region) to each user's Kite developer console allow-list. A
#      sin-region machine has a different egress IP and would fail
#      every order with "IP not whitelisted".
#   2. Kite API is India-only; sin-region health checks against
#      api.kite.trade still traverse the BOM peering, so latency
#      "improvement" is illusory.
#
# When a non-Kite broker (Upstox / Groww via broker/ adapters) is
# wired, add the secondary via `flyctl machines clone --region sin`
# AND add `secondary_region = "sin"` here as documentation. Failover
# procedure: see incident-response.md.

[http_service]
  internal_port = 8080
  force_https = true
  # Flipped to scale-to-zero 2026-06-14 (cost): app is ~99% idle (1-3 MB/mo
  # egress) and cost ~$3/mo always-on. SAFE re: the SEBI IP allow-list because
  # 209.71.68.157 is a DEDICATED bom egress IP (fly ips list, allocated Apr 1
  # 2026) that PERSISTS across machine stop/start in-region, so the whitelisted
  # egress IP does NOT change. (A region change WOULD change it; still gated,
  # see the region note above.) ENABLE_TRADING=false so the hosted build is
  # read-only; ~12s cold start on wake (dominated by a synchronous
  # api.kite.trade instruments.json fetch during boot before the port binds).
  # Deferred follow-up: make the instruments load async/non-fatal so the cold
  # start shrinks and a Kite-API hiccup at wake can't crash-loop boot. Residual:
  # the Fly "stuck-stopped after platform churn" bug class, recoverable via a
  # manual restart.
  auto_stop_machines = "stop"
  min_machines_running = 0

  # Compress text responses at the Fly proxy. Saves -15-25% wire bytes
  # on the dashboard / landing / static CSS. Brotli is preferred when
  # the client advertises it (Chrome / Firefox / Safari), gzip is the
  # widely-supported fallback. Binary responses (woff2, png) are not
  # re-compressed.
  [http_service.compression]
    algorithms = ["br", "gzip"]

[mounts]
  source = "kite_data"
  destination = "/data"

[env]
  APP_MODE = "http"
  APP_PORT = "8080"
  APP_HOST = "0.0.0.0"
  LOG_LEVEL = "info"
  ALERT_DB_PATH = "/data/alerts.db"
  # ENABLE_TRADING=false strips place_order / modify_order / GTT /
  # trailing-stop / native-alert / MF-order / exit-helper tools from the
  # hosted multi-user build. Without this gate the server would fall
  # under NSE/INVG/69255 Annexure I Para 2.8 "Algo Provider"
  # classification ("all orders received via API from clients / Algo
  # Provider's platform shall be considered as Algo and will be
  # required to be tagged"). Local single-user builds override by
  # setting ENABLE_TRADING=true in their shell.
  ENABLE_TRADING = "false"
