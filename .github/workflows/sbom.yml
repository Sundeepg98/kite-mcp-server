name: Generate SBOM
# Supply chain transparency: generate a CycloneDX Software Bill of Materials
# listing every Go module dependency + license. Protects against OWASP LLM03
# (supply chain risk) and gives customers evidence for compliance audits.
#
# Triggers:
#   - push to master: fresh SBOM on every main-branch change, uploaded as
#     a workflow artifact (90-day retention).
#   - tag v*: same SBOM attached to the GitHub Release as a downloadable asset.
#   - workflow_dispatch: manual runs (e.g. regenerating an SBOM for an audit).
#
# Output formats:
#   - kite-mcp-sbom.cdx.json (machine-readable, feeds syft/trivy/grype)
#   - kite-mcp-sbom.cdx.xml  (human-readable, easier for compliance review)
#
# See docs/sbom.md for how to verify the SBOM locally and what it contains.

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sbom:
    name: generate-cyclonedx-sbom
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to attach SBOM to release on tag push
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install cyclonedx-gomod
        run: go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest

      - name: Generate SBOM (JSON)
        run: cyclonedx-gomod mod -licenses -json -output kite-mcp-sbom.cdx.json

      - name: Generate SBOM (XML, human-readable)
        run: cyclonedx-gomod mod -licenses -output kite-mcp-sbom.cdx.xml

      - name: Upload SBOM (branch / manual run)
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: kite-mcp-sbom.cdx.*
          retention-days: 90
          if-no-files-found: error

      - name: Attach SBOM to GitHub Release (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: kite-mcp-sbom.cdx.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
