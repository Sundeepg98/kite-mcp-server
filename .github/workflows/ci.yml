name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Path A item 2 per audit 6ee6520: cancel in-flight CI runs on rapid commits
# to the same branch. Saves CI minutes when multiple commits land within
# the ~5min CI window. Group is workflow-name + ref; on master push this
# means a 2nd push within 5 min cancels the 1st run-in-progress, keeping
# only the latest commit's verification. Pull-request events get isolated
# by their own ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Path A item 1 per audit 6ee6520: dropped macos-latest ($0.08/min vs
        # $0.008/min ubuntu — 10x cost). Empirical CI cost dominated by
        # macOS minute multiplier. Linux + Windows coverage retained because:
        #   - ubuntu-latest = Fly.io production target (Linux)
        #   - windows-latest = local dev target (user runs Windows + WSL2)
        # macOS coverage was redundant: no macOS-specific build paths in this
        # codebase. Re-add macos-latest if a macOS-only regression surface
        # ever exists (none currently).
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          # Path A item 3 per audit 6ee6520: full history needed for the
          # smart-test-selection script (scripts/affected-test-paths.sh)
          # to diff against origin/master. Cost: +2-5s checkout time vs
          # default fetch-depth: 1. Worth it for the test-runtime savings.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      # Path A item 3 per audit 6ee6520: smart test selection (Go-equivalent
      # of nx affected). On pull-request events, narrow `go test` to packages
      # affected by the PR diff. On push-to-master events, fall back to full
      # `./...` (safety: catches cross-module regressions the diff cannot
      # see). The bash-only script has no external deps; see
      # scripts/affected-test-paths.sh for the decision tree.
      #
      # Safety net: a weekly cron job (test-full-weekly.yml) runs the full
      # suite regardless of diff. Smart selection can theoretically miss a
      # regression where an unchanged consumer is broken by a changed
      # exported API; the weekly run is the catch-all.
      - name: Compute affected test paths (PR only)
        id: affected
        if: github.event_name == 'pull_request' && matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          paths=$(bash scripts/affected-test-paths.sh origin/master)
          if [[ -z "${paths}" ]]; then
            echo "No Go-relevant changes detected — skipping test step."
            echo "paths=" >> "${GITHUB_OUTPUT}"
            echo "skip=true" >> "${GITHUB_OUTPUT}"
          else
            echo "Affected test paths: ${paths}"
            echo "paths=${paths}" >> "${GITHUB_OUTPUT}"
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Test (smart selection — PR ubuntu)
        if: github.event_name == 'pull_request' && matrix.os == 'ubuntu-latest' && steps.affected.outputs.skip != 'true'
        run: go test ${{ steps.affected.outputs.paths }} -count=1 -race -timeout 8m -coverprofile=coverage.out -covermode=atomic

      - name: Test (full — push to master, all OS)
        if: github.event_name != 'pull_request' || matrix.os != 'ubuntu-latest'
        run: go test ./... -count=1 -race -timeout 8m -coverprofile=coverage.out -covermode=atomic

      # E1: end-to-end MCP-protocol roundtrip — //go:build e2e gated; runs
      # only on ubuntu-latest because spawning the compiled binary +
      # JSON-RPC pipe is the same regression surface across OSes and
      # ubuntu is fastest in our CI fleet.
      - name: E2E protocol roundtrip
        if: matrix.os == 'ubuntu-latest'
        run: go test -tags=e2e -count=1 -timeout 5m ./mcp/...

      # F7 close: kc/aop is the reflection-AOP package gated behind
      # //go:build research per ADR-0008 — anti-Go-idiom path
      # authorised for rubric-score reasons. Excluded from default
      # `go test ./...` runs (zero production callers anywhere; see
      # kc/aop/aop.go package godoc for the build-gate rationale).
      # This matrix entry preserves coverage on a single ubuntu-latest
      # runner so the package's behaviour is still exercised in CI
      # without paying the reflection-dispatch overhead on every
      # production test cycle.
      - name: Research-tag tests (kc/aop reflection-AOP)
        if: matrix.os == 'ubuntu-latest'
        run: go test -tags=research -count=1 -timeout 2m ./kc/aop/...

      - name: Upload coverage artifact
        if: always() && matrix.os == 'ubuntu-latest' && hashFiles('coverage.out') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: ignore
          retention-days: 7

      # E4: Codecov upload — runs only on ubuntu-latest.
      # Token is optional for public repos (uploads via tokenless mode);
      # CODECOV_TOKEN secret can be added later for private-repo support
      # or stricter rate limits without changing this workflow.
      - name: Upload to Codecov
        if: matrix.os == 'ubuntu-latest' && hashFiles('coverage.out') != ''
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          flags: unit
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
