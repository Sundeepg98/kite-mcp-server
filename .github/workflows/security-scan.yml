# Security scanning: gosec (SAST) + govulncheck (known-CVE) with SARIF upload
# to GitHub Code Scanning.
#
# Runs on every push/PR to master, weekly (Sunday 03:00 UTC ~ 08:30 IST Monday),
# and on manual dispatch. Complements the existing security.yml workflow:
#  - security.yml       : quick inline gosec, no SARIF, fails only on severe CVEs
#  - security-scan.yml  : SARIF output -> GitHub Code Scanning, 90-day artifact
#                         retention, weekly cadence for trend tracking
#
# Agent 54 recommendation: "run gosec monthly; compare SARIF diff" - automated
# via Code Scanning dashboard (Security tab -> Code scanning alerts).
#
# See docs/security-scanning.md for local invocation + findings triage.

name: Security Scan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0'  # weekly Sunday 03:00 UTC (~08:30 IST Monday)

permissions:
  contents: read
  security-events: write  # required for github/codeql-action/upload-sarif

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gosec:
    name: gosec (SAST -> SARIF -> Code Scanning)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec (SARIF output)
        # -no-fail: do not fail the job; Code Scanning dashboard surfaces findings.
        # -exclude-dir: skip vendored deps and research scratchpad (not shipped).
        run: gosec -no-fail -fmt=sarif -out=gosec.sarif -exclude-dir=vendor -exclude-dir=.research ./...

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec.sarif

      - name: Upload SARIF artifact (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gosec-sarif
          path: gosec.sarif
          retention-days: 90
          if-no-files-found: warn

  govulncheck:
    name: govulncheck (known-CVE dep + stdlib scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        # Fails the workflow on any called vulnerable symbol (Go 1.25 default).
        # Reachability-aware: only flags CVEs whose vulnerable code paths are
        # actually imported and called, minimising noise.
        run: govulncheck ./...
