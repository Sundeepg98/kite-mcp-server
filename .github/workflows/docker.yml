name: Docker Build
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    paths:
      - 'Dockerfile.selfhost'
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/docker.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Path A item 2 per audit 6ee6520: cancel in-flight Docker builds when a
# newer commit lands on the same branch. Docker build is idempotent and
# re-runnable, so superseding stale builds saves ~5 min per cancelled run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build-selfhost-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build self-hosted image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.selfhost
          push: false
          load: false
          tags: kite-mcp-server:selfhost-ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
