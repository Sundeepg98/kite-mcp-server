name: Security Scan
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Path A item 2 per audit 6ee6520: cancel stale security scans when a newer
# commit supersedes them on the same branch. Re-runnable scan; cancellation
# preserves only the latest commit's verification. Group key is filename-
# based (not github.workflow) because security-scan.yml shares the same
# `name: Security Scan` and would collide with this workflow's group.
concurrency:
  group: security-yml-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Go Vet
        run: go vet ./...

      - name: gosec
        uses: securego/gosec@master
        with:
          args: ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./... -count=1
