name: Playwright E2E

on:
  push:
    branches: [master]
    paths:
      - 'app/**'
      - 'mcp/**'
      - 'kc/**'
      - 'broker/**'
      - 'oauth/**'
      - 'tests/e2e/**'
      - '.github/workflows/playwright.yml'
  pull_request:
    branches: [master]
    paths:
      - 'app/**'
      - 'mcp/**'
      - 'kc/**'
      - 'broker/**'
      - 'oauth/**'
      - 'tests/e2e/**'
      - '.github/workflows/playwright.yml'
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Single concurrency group per branch — cancel stale runs on push.
concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: smoke (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/e2e/package.json

      - name: Build kite-mcp-server binary
        run: go build -o bin/kite-mcp-server .

      - name: Install Playwright deps
        working-directory: tests/e2e
        # `npm install` is intentional (not `npm ci`) — we don't ship a
        # package-lock.json yet; first-run uses cached resolved versions.
        # Switch to `npm ci` once the lockfile is committed (post-bake).
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Start kite-mcp-server in background
        # DEV_MODE=true + no OAuth env vars → /mcp is unauth'd, /healthz
        # serves immediately, landing template renders. This is the
        # smoke-test posture — we want NO real OAuth in CI.
        env:
          DEV_MODE: 'true'
          BIND_ADDR: '127.0.0.1:8080'
          # Explicitly omit: OAUTH_JWT_SECRET, KITE_API_KEY, KITE_API_SECRET.
          # Their absence makes app.oauthHandler nil and /mcp public.
        run: |
          ./bin/kite-mcp-server > server.log 2>&1 &
          echo $! > server.pid
          # Wait up to 30s for /healthz to come up.
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://127.0.0.1:8080/healthz; then
              echo "Server up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start within 30s. Last 100 lines of log:"
          tail -100 server.log
          exit 1

      - name: Run Playwright smoke suite
        working-directory: tests/e2e
        env:
          TARGET_BASE_URL: 'http://127.0.0.1:8080'
          CI: 'true'
        run: npm test

      - name: Upload Playwright HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: server.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Stop kite-mcp-server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" 2>/dev/null || true
          fi
